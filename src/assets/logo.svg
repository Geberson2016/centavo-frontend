<svg width="100%" height="100%" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente moeda -->
    <radialGradient id="coinBase" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7dffb0"/>
      <stop offset="50%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1b8f4d"/>
    </radialGradient>

    <!-- Aro -->
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#69b15fc5"/>
      <stop offset="40%" stop-color="#4ca84c"/>
      <stop offset="100%" stop-color="#1b8f4d"/>
    </linearGradient>

    <!-- Brilho -->
    <radialGradient id="highlight" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Sombra geral -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Sombra leve texto -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g transform="translate(30,20)">
    <circle cx="80" cy="80" r="70" fill="url(#rim)" filter="url(#shadow)"/>
    <circle cx="80" cy="80" r="60" fill="url(#coinBase)"/>
    <ellipse cx="60" cy="50" rx="45" ry="20" fill="url(#highlight)"/>

<text x="80" y="125"
      text-anchor="middle"
      font-size="130"
      font-weight="bold"
      font-family="Segoe UI, Arial, sans-serif"
      fill="#ffffff"
      stroke="#1a1d1a"
      stroke-width="2"
      paint-order="stroke">
  C
</text>

<text x="83" y="95"
      text-anchor="middle"
      font-size="40"
      font-weight="bold"
      font-family="Segoe UI, Arial, sans-serif"
      fill="#f7fcec"
      stroke="#000000"
      stroke-width="2"
      paint-order="stroke">
  $
</text>
  </g>

  <text x="200" y="125"
        font-size="75"
        font-weight="600"
        letter-spacing="1.5"
        font-family="Segoe UI, Arial, sans-serif"
        fill="#f7fcec"
        filter="url(#textShadow)">
    centavo
  </text>
</svg>